plugins {
    id 'java'
    id 'net.neoforged.gradle.userdev' version '7.0.190'
}

group = 'com.theexpanse'
version = '0.1.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenLocal()
    maven { url = 'https://maven.neoforged.net/releases' }
    maven { url = 'https://repo.spongepowered.org/maven' }
    mavenCentral()
}

ext {
    mc_version = "1.21.1"
    neoforge_version = "21.1.209"
    mod_id = "the_expanse"
    mod_name = "The Expanse"
    mod_author = "The Expanse Team"
    mod_license = "MIT"
    mod_description = "Extends world vertical bounds and retunes terrain, carvers, and ores."
    homepage_url = "https://example.com/the_expanse"
    sources_url = "https://github.com/your-org/the_expanse"
    issues_url = "https://github.com/your-org/the_expanse/issues"
}

processResources {
    // Declare all inputs for up-to-date checking
    inputs.property "mod_id", mod_id
    inputs.property "mod_name", mod_name
    inputs.property "version", project.version
    inputs.property "mc_version", mc_version
    inputs.property "neoforge_version", neoforge_version
    inputs.property "mod_description", mod_description
    inputs.property "homepage_url", homepage_url
    inputs.property "sources_url", sources_url
    inputs.property "issues_url", issues_url
    inputs.property "mod_license", mod_license
    inputs.property "mod_author", mod_author

    // Expand variables in neoforge.mods.toml
    filesMatching("META-INF/neoforge.mods.toml") {
        expand([
                mod_id: mod_id,
                mod_name: mod_name,
                version: project.version,
                mc_version: mc_version,
                neoforge_version: neoforge_version,
                mod_description: mod_description,
                homepage_url: homepage_url,
                sources_url: sources_url,
                issues_url: issues_url,
                mod_license: mod_license,
                mod_author: mod_author
        ])
    }

    // CHANGED: Use WARN instead of EXCLUDE to see what's happening
    duplicatesStrategy = DuplicatesStrategy.WARN
}

dependencies {
    implementation "net.neoforged:neoforge:${neoforge_version}"
    compileOnly "org.spongepowered:mixin:0.8.7"
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 21
}

jar {
    manifest {
        attributes(
                "Implementation-Title": project.name,
                "Implementation-Version": project.version,
                "Implementation-Vendor": "the_expanse",
                "Built-By": "codex",
                "Automatic-Module-Name": "com.theexpanse.mod"
        )
    }

    from("LICENSE") { into "META-INF" }

    // Explicitly include pack.mcmeta from resources
    from(sourceSets.main.resources) {
        include 'pack.mcmeta'
        include 'the_expanse.mixins.json'
        include 'META-INF/**'
        include 'assets/**'
        include 'data/**'
        // Add duplicate handling strategy
        duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    }
}

tasks.named("test") {
    enabled = false
}