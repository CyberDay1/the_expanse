[worldrise]
oreScaling = true
carverEnabled = true
megaRavines = true
sinkholes = true
blueHoles = true
strongholdScaling = true
ancientCityScaling = true
mineshaftScaling = true
fortressScaling = true
bastionScaling = true
monumentScaling = true
endCityScaling = true
netherScaling = true
endScaling = true
tectonicEnabled = true
lithoEnabled = true

[worldrise.compat]
moonriseCompatEnabled = true
ftbMaterialsCompatEnabled = true
silentGearCompatEnabled = true
productiveMetalworksCompatEnabled = true

[worldrise.scaling]
defaultOreMultiplier = 1.0
defaultCarverMultiplier = 1.0

# Per-biome overrides: comma-separated list of biome tag or ID = multiplier entries
biomeOreMultipliers = "#minecraft:is_mountain=1.5,#minecraft:is_ocean=0.5"
biomeCarverMultipliers = "#worldrise:ocean_biomes=2.0"

[worldrise.compatibility]
biomesoplenty = true
byg = true
